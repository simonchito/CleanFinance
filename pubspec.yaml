name: clean_finance
description: App offline de finanzas personales, privada y minimalista.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cryptography: ^2.7.0
  file_picker: ^8.1.2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.0.0
  google_fonts: ^6.3.1
  intl: ^0.20.2
  local_auth: ^3.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  share_plus: ^10.1.2
  sqflite: ^2.4.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/cleanfinance-logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/cleanfinance-logo.png
  adaptive_icon_background: "#122451"
  adaptive_icon_foreground: assets/images/cleanfinance-logo.png

